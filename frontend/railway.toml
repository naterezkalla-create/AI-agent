[build]
builder = "dockerfile"
dockerfilePath = "Dockerfile"

[deploy]
port = 3000
healthcheckPath = "/"
healthcheckTimeout = 60
healthcheckInterval = 10
healthcheckRetries = 5
restartPolicyMaxRetries = 5

[deploy.environment]
PORT = "3000"
BACKEND_UPSTREAM = "http://ai-agent.railway.internal:8080"
